name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npx eslint js/

      - name: HTML validation
        run: npx htmlhint --rules tag-pair,doctype-first,id-unique,src-not-empty index.html

      - name: Test
        run: npx vitest run
